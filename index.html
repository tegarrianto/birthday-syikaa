<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('foto/bg.jpg') center/cover no-repeat;
  filter: brightness(0.6);
  z-index: -1;
}

/* GENERAL */
.container {
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
}

p {
  font-size: 1.2rem;
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 1rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: #ff4d6d;
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* POPUP */
.popup {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.no-btn {
  position: relative;
}

/* TIMELINE */
.timeline {
  display: none;
  flex-direction: column;
  gap: 30px;
  padding: 20px;
  overflow-y: auto;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

.card img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* HIDDEN MESSAGE */
.hidden {
  display: none;
}

.typing {
  font-size: 1.4rem;
  max-width: 800px;
  margin: auto;
  line-height: 1.8;
}

/* LOVE FALL */
.heart {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* RESPONSIVE */
@media (min-width: 768px) {
  h1 { font-size: 3.5rem; }
  p { font-size: 1.5rem; }
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="musik/wave-to-earth.mp3">
</audio>

<!-- POPUP -->
<div class="popup" id="popup">
  <h1>Happy Birthday Sayang ❤️</h1>
  <p>Mau lanjut lihat sesuatu?</p>
  <button onclick="start()">Mau</button>
  <button class="no-btn" onmouseover="moveBtn(this)">Ngga</button>
</div>

<!-- TIMELINE -->
<div class="timeline" id="timeline">

  <div class="card">
    <img src="foto/foto3.jpg">
    <p>Ini awal kita kenal, masih canggung tapi seru 😋</p>
  </div>

  <div class="card">
    <img src="foto/foto2.jpg">
    <p>Mulai deket, banyak cerita bareng 💕</p>
  </div>

  <div class="card">
    <img src="foto/foto1.jpg">
    <p>Dan sekarang... kamu jadi bagian penting hidup aku ❤️</p>
  </div>

  <button onclick="showChoice()">Lanjut?</button>
</div>

<!-- PILIHAN -->
<div class="container hidden" id="choice">
  <h1>Mau lanjut ke pesan rahasia?</h1>
  <button onclick="showMessage()">Mau</button>
  <button class="no-btn" onmouseover="moveBtn(this)">Ngga</button>
</div>

<!-- HIDDEN MESSAGE -->
<div class="container hidden" id="message">
  <div class="typing" id="typing"></div>
</div>

<script>
function start() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("timeline").style.display = "flex";
}

function moveBtn(btn) {
  btn.style.position = "absolute";
  btn.style.top = Math.random()*80 + "%";
  btn.style.left = Math.random()*80 + "%";
}

function showChoice() {
  document.getElementById("timeline").style.display = "none";
  document.getElementById("choice").style.display = "flex";
}

function showMessage() {
  document.getElementById("choice").style.display = "none";
  document.getElementById("message").style.display = "flex";
  typingEffect();
  createHearts();
}

/* TYPING EFFECT */
const text = `Selamat ulang tahun yaa sayang ❤️

Aku bersyukur banget bisa kenal kamu...
Kamu bukan cuma hadir, tapi kamu bawa warna di hidup aku.

Semoga di umur kamu sekarang,
semua hal baik selalu datang ke kamu,
dan aku masih jadi bagian dari perjalanan kamu.

Aku sayang kamu, selalu 💕`;

let i = 0;

function typingEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typingEffect, 40);
  }
}

/* LOVE FALL */
function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
